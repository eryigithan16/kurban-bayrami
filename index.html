<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />

    <meta property="og:type" content="website" />

    <canvas id="fx" aria-hidden="true"></canvas>

    <main class="wrap">
      <header class="top">
        <div class="badge" id="badge" aria-label="Sürpriz">💝</div>

          <h1 class="title" id="title">Kurban Bayramın kutlu olsun</h1>
          <p class="sub" id="sub">

            <path
              d="M126 174 C138 186, 150 186, 162 174"

            <path
              d="M234 92 C226 62, 260 48, 274 72"

            <rect x="360" y="215" width="24" height="56" rx="12" fill="#fff" opacity="0.9" />

              d="M86 122 C52 118, 44 150, 72 166"

              d="M190 122 C226 118, 234 150, 206 166"

          <span class="hl">Seni çok seviyorum.</span>
        </p>

      <div class="stickersBelow" aria-hidden="true">
        <img
          class="stickerGif left"
          alt=""
          loading="lazy"
          src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExdDdmOGllNGt5dnhxMGhxY2FrZ3dtMWpzOWhrMDY2bXNhcGQ4aXkzeiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/cRDS9ok68bBJoV1RFW/giphy.gif"
